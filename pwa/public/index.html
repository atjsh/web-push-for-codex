<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <title>Codex Alerts</title>
    <style>
      body { font-family: system-ui, sans-serif; max-width: 680px; margin: 2rem auto; padding: 0 1rem; }
      button { border: 0; background: #1d4ed8; color: white; border-radius: 8px; padding: 0.65rem 1rem; font-size: 1rem; }
      code { background: #f1f5f9; padding: 0.15rem 0.35rem; border-radius: 4px; }
    </style>
  </head>
  <body>
    <h1>Codex Web Push Alerts</h1>
    <p>Install this app on iPhone Home Screen, open from there, then enable notifications.</p>
    <button id="enable">Enable notifications</button>
    <p id="status"></p>

    <script>
      const vapidPublicKey = window.__VAPID_PUBLIC_KEY__ || 'BElideThisForMvpReplaceWithRealKey';

      function urlBase64ToUint8Array(base64String) {
        const padding = '='.repeat((4 - (base64String.length % 4)) % 4);
        const base64 = (base64String + padding).replace(/-/g, '+').replace(/_/g, '/');
        const rawData = atob(base64);
        const outputArray = new Uint8Array(rawData.length);
        for (let i = 0; i < rawData.length; ++i) {
          outputArray[i] = rawData.charCodeAt(i);
        }
        return outputArray;
      }

      async function enableNotifications() {
        const status = document.getElementById('status');
        const registration = await navigator.serviceWorker.register('/service-worker.js');
        const permission = await Notification.requestPermission();
        if (permission !== 'granted') {
          status.textContent = 'Notification permission denied.';
          return;
        }

        const subscription = await registration.pushManager.subscribe({
          userVisibleOnly: true,
          applicationServerKey: urlBase64ToUint8Array(vapidPublicKey)
        });

        const res = await fetch('/api/push/subscribe', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(subscription)
        });

        if (!res.ok) {
          const err = await res.json();
          status.textContent = err.message || 'Subscription failed.';
          return;
        }

        status.textContent = 'Notifications enabled.';
      }

      document.getElementById('enable').addEventListener('click', () => {
        enableNotifications().catch((error) => {
          document.getElementById('status').textContent = `Failed: ${error.message}`;
        });
      });
    </script>
  </body>
</html>
